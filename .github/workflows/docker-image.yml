name: Docker Image Build and Push

on:
  push:
    branches:
      - master
    paths:
      - 'scripts/**'
      - 'Dockerfile-for-github-action'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # 允许推送到 ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from config.yaml
        id: get_version
        run: |
          VERSION=$(grep '^version:' config.yaml | sed 's/version: "//' | sed 's/"//')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "构建版本: ${VERSION}"

      - name: Build and push amd64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile-for-github-action
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          build-args: VERSION=${{ steps.get_version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/sgcc_electricity-amd64:latest
            ghcr.io/${{ github.repository_owner }}/sgcc_electricity-amd64:${{ steps.get_version.outputs.version }}

      - name: Build and push aarch64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile-for-github-action
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          build-args: VERSION=${{ steps.get_version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/sgcc_electricity-aarch64:latest
            ghcr.io/${{ github.repository_owner }}/sgcc_electricity-aarch64:${{ steps.get_version.outputs.version }}
